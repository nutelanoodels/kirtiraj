databases:
  - name: kirtiraj-db
    plan: free
    databaseName: kirtiraj
    user: kirtiraj_user

services:
  - type: web
    name: kirtiraj
    plan: free
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py create_admin && python load_data.py && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kirtiraj-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_USERNAME
        value: "admin"
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_OWNER_CHAT_ID
        sync: false
      - key: ADMIN_PHONE
        value: "919173760611"
      - key: PYTHON_VERSION
        value: "3.13.4"

  - type: static
    name: kirtiraj-frontend
    plan: free
    publishDir: docs
